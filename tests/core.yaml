cases:
  - name: outgoing relationship
    markdown: |
      [:knows](bob.md)
    relationships:
      - source: alice.md
        type: knows
        target: bob.md

  - name: direction marker syntax
    markdown: |
      [:approvedBy -> Invoice](invoice.md)
    relationships: []
    warnings: true

  - name: relationship properties
    markdown: |
      [:approvedBy {date: 2026-06-26, confidence: 0.98}](peter.md)
    properties:
      date: 2026-06-26
      confidence: 0.98

  - name: ordinary hyperlink
    markdown: |
      [Read the invoice](invoice.md)
    relationships: []

  - name: malformed semantic relationship
    markdown: |
      [:approvedBy {date](target.md)
    warnings: true
